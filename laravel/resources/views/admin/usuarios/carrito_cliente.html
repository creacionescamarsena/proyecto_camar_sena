<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito Creaciones Camar</title>
 <link href="bootstrap.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="fonts.css" rel="stylesheet">
  <link rel="stylesheet" href="style_cliente.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar-cliente">
  <div class="nav-brand">
    <img src="logo.png" alt="Logo" style="width:64px; height:64px; object-fit:contain;">
    <span class="brand-name">Creaciones Camar</span>
  </div>
  <div class="nav-links">
    <a href="catalogo_cliente.html" class="nav-link-item">Catálogo</a>
    <a href="pedidos_cliente.html" class="nav-link-item">Mis pedidos</a>
  </div>
  <div class="nav-actions">
    <a href="carrito_cliente.html" class="nav-icon-btn active" title="Carrito">
      <i class="bi bi-cart3"></i>
      <span class="cart-badge" id="cartBadgeNav">2</span>
    </a>
    <button class="nav-icon-btn" onclick="document.getElementById('modalUsuario').classList.add('show')" title="Perfil">
      <i class="bi bi-person-circle"></i>
    </button>
    <a href="index.html" class="nav-icon-btn" title="Cerrar sesión">
      <i class="bi bi-box-arrow-right"></i>
    </a>
  </div>
</nav>

<div class="carrito-container">
  <!-- Lista de items -->
  <div>
    <h2 class="section-title">Carrito de compras</h2>

    <div class="carrito-items" id="carritoItems">

      <div class="carrito-item" id="item1">
        <div class="carrito-item-img"><i class="bi bi-image"></i></div>
        <div class="carrito-item-info">
          <p class="carrito-item-nombre">Chaqueta Alpina</p>
          <p class="carrito-item-talla">Talla: M</p>
          <div class="carrito-item-controls">
            <button class="ctrl-btn" >-</button>
            <span class="ctrl-num" id="cant-item1">1</span>
            <button class="ctrl-btn">+</button>
          </div>
        </div>
        <span class="carrito-item-precio" id="precio-item1">$120.000</span>
        <button class="btn-eliminar"  title="Eliminar">
          <i class="bi bi-trash3"></i>
        </button>
      </div>

      <div class="carrito-item" id="item2">
        <div class="carrito-item-img"><i class="bi bi-image"></i></div>
        <div class="carrito-item-info">
          <p class="carrito-item-nombre">Chaqueta Sprint</p>
          <p class="carrito-item-talla">Talla: L</p>
          <div class="carrito-item-controls">
            <button class="ctrl-btn" >-</button>
            <span class="ctrl-num" id="cant-item2">1</span>
            <button class="ctrl-btn" >+</button>
          </div>
        </div>
        <span class="carrito-item-precio" id="precio-item2">$95.000</span>
        <button class="btn-eliminar" title="Eliminar">
          <i class="bi bi-trash3"></i>
        </button>
      </div>

    </div>

    <button class="btn-vaciar" >
      <i class="bi bi-trash3 me-2"></i>Vaciar carrito
    </button>
  </div>

  <!-- Resumen -->
  <div>
    <div class="resumen-card">
      <p class="resumen-title">Resumen del pedido</p>
      <div class="resumen-row">
        <span>Subtotal</span>
        <span id="subtotal">$215.000</span>
      </div>
      <div class="resumen-row">
        <span>Envío</span>
        <span id="envio">$10.000</span>
      </div>
      <div class="resumen-total">
        <span>Total</span>
        <span class="resumen-total-val" id="total">$225.000</span>
      </div>
      <button class="btn-pagar" onclick="window.location.href='catalogo_cliente.html'">
        Proceder con el pago
      </button>
      <a href="catalogo_cliente.html" class="btn-seguir">
        Continuar comprando
      </a>
    </div>
  </div>
</div>

<!-- Modal Usuario -->
<div class="modal-overlay" id="modalUsuario">
  <div class="modal-user">
    <button class="modal-close" onclick="document.getElementById('modalUsuario').classList.remove('show')">
      <i class="bi bi-x-lg"></i>
    </button>
    <div class="user-avatar-lg"><i class="bi bi-person-fill"></i></div>
    <h5 class="modal-user-title">Datos del usuario</h5>
    <div class="user-field-group">
      <label>Nombres</label>
      <div class="user-field">
        <input type="text" value="Carlos" disabled id="inputNombre">
        <button class="edit-btn" onclick="toggleEdit('inputNombre', this)"><i class="bi bi-pencil"></i></button>
      </div>
      <label>Apellidos</label>
      <div class="user-field">
        <input type="text" value="Martínez" disabled id="inputApellido">
        <button class="edit-btn" onclick="toggleEdit('inputApellido', this)"><i class="bi bi-pencil"></i></button>
      </div>
      <label>Dirección</label>
      <div class="user-field">
        <input type="text" value="Calle 10 # 5-30" disabled id="inputDireccion">
        <button class="edit-btn" onclick="toggleEdit('inputDireccion', this)"><i class="bi bi-pencil"></i></button>
      </div>
      <label>Teléfono</label>
      <div class="user-field">
        <input type="text" value="3001234567" disabled id="inputTelefono">
        <button class="edit-btn" onclick="toggleEdit('inputTelefono', this)"><i class="bi bi-pencil"></i></button>
      </div>
      <label>Correo</label>
      <div class="user-field">
        <input type="email" value="carlos@email.com" disabled id="inputCorreo">
        <button class="edit-btn" onclick="toggleEdit('inputCorreo', this)"><i class="bi bi-pencil"></i></button>
      </div>
      <label>Contraseña</label>
      <div class="user-field">
        <input type="password" value="mipassword" disabled id="inputPass">
        <button class="edit-btn" onclick="toggleEdit('inputPass', this)"><i class="bi bi-pencil"></i></button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
